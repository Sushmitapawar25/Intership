    <!-- How to create dropdown in javaScript -->

    <div id="divDD"></div>
    <button onclick="makeDD()">Make Dropdown</button>

    <script>
        let empData = [
            {name:'Steve',empId:'BM222'},
            {name:'George',empId:'BM405'},
            {name:'Mary',empId:'CT188'},
            {name:'Anna',empId:'AK534'},
            {name:'Jack',empId:'CT029'},
        ];

        function makeDD(){
            let div = document.getElementById('divDD');
            let html = makeDDOptions(empData,'Select Employee');
            div.innerHTML = html;
        }
        function makeDDOptions(arr,valOnTop){
            const optArr = arr.map(function(opt){
                return '<option>'+opt.name+'</option>';
            });
            let topStr = '<option selected disabled>'+valOnTop+'</option>';
            let str = '<select>' + optArr.join('')+'</select>';
            console.log(str);
            return str; 
        }
    </script>
