<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .focusStyle{
            background-color: lightgreen;
            font-weight: bold;
        }
        .mouseStyle{
            background-color: lightpink;
        }
    </style>
</head>
<body>
    <h4 id="title" onclick="clicked(this)" 
    onmouseover="mouseover(this)"
    onmouseout="mouseout(this)" 
    onmousemove="mousemove(this)">
    Checking Events</h4>
    Text 1 :<input type="text" id="txt1"
            onchange="change(this)" onkeydown="keydown(this)"
            onkeypress="keypress(this)" onkeyup="keyup(this)"
            onmouseover="mouseover(this)" onmouseout="mouseout(this)"
            onmousemove="mousemove(this)" onfocus="focusin(this)" onblur="focusout(this)">
    <br>
    <button id="btn1" 
            onclick="clicked(this)" 
            onmouseover="mouseover(this)"
            onmouseout="mouseout(this)">
    Button</button>
    <br/>
    <select id="dd1"
            onchange="change(this)"
            onfocus="focusin(this)"
            onblur="focusout(this)">
        <option>Apple</option>
        <option>Aeroplane</option>
        <option>Banana</option>
        <option>Bat</option>
        <option>Ball</option>
        <option>Cat</option>
    </select>

    <script>
        function change(elem){
            console.log("onchange",elem.id,event);
        }
        function clicked(elem){
            console.log("onclick",elem.id,event);
        }
        function mouseover(elem){
            console.log("onmouseover",elem.id,event);
            elem.className = 'mouseStyle';
        }
        function mouseout(elem){
            console.log("onmouseout",elem.id,event);
            elem.className='';
        }
        function mousemove(elem){
            console.log("mousemove",elem.id,event);
        }
        function keydown(elem){
            console.log("onkeydown",elem.id,event);
        }
        function keyup(elem){
            console.log("onkeyup",elem.id,event);
        }
        function keypress(elem){
            console.log("keypress",elem.id,event);
        }
        function focusin(elem){
            console.log("onfocusin",elem.id,event);
            elem.className = "focusStyle"
        }
        function focusout(elem){
            console.log("onblur",elem.id,event);
            elem.className = '';
        }
    </script>
</body>
</html>
