<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>

    <style>

        body{
            font-family: Arial;
            margin:40px;
        }

        input{
            padding:8px;
            margin-top:10px;
        }

    </style>

</head>

<body>

<h3>Email Option</h3>

<input type="checkbox"
id="cb1"
onchange="showEmail()">

Send Email

<br><br>

<div id="emailBox"></div>

<script>

    function showEmail(){

        let checked =
        document.getElementById("cb1").checked;

        let html = "";


        if(checked){

            html += "Enter Email : ";

            html += "<input type='text' ";
            html += "placeholder='Enter Email'>";
        }

        else{

            html = "";
        }

        document.getElementById("emailBox").innerHTML =
        html;
    }

</script>

</body>
</html>
