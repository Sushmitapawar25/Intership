<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
        }
        .sp1 {
            background-color: rgb(129, 236, 129);
            padding-left: 8px;
            padding-top: 4px;
            padding-bottom: 3px;
            padding-right: 200px;
            border-right: 3px solid black;
            border-bottom: 2px solid black;
            border-top: 1px solid rgb(238, 224, 224);
            border-left: 2px solid rgb(238, 224, 224);
        }
        .sp2{
            background-color: pink;
            padding-left: 8px;
            padding-top: 4px;
            padding-bottom: 3px;
            padding-right: 200px;
            border-top: 1px solid rgb(238, 224, 224);
            border-right: 2px solid rgb(238, 224, 224);
            border-bottom: 2px solid black;
        }
    </style>
</head>

<body>
    <h3>Welcome to the Quiz Show</h3>
    <div class="container">
        <div class="sp1">
            <h4>Dave Burton</h4>
            <h4>5</h4>
            <button>+5</button>
            <button>+2</button>
            <button>-1</button>
        </div>
        <div class="sp2">
            <h4>Mary Stevens</h4>
            <h4>0</h4>
            <button>+5</button>
            <button>+2</button>
            <button>-1</button>
        </div>
    </div>
</body>

</html>
