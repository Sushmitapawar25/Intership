<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy Travels</title>
  <style>
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
    }

    
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background-color: #fff;
    }

    .navbar .logo {
      font-size: 20px;
      font-weight: bold;
      color: #000;
      letter-spacing: 1.5px;
    }

    .navbar nav {
      display: flex;
      gap: 30px;
    }

    .navbar nav a {
      text-decoration: none;
      color: #000;
      font-size: 14px;
    }

    
    .hero {
      background-color: #333333;
      padding: 200px 200px;
      text-align: center;
      color: #fff;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
    }

    .hero p {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 16px;
      color: #ddd;
      margin-bottom: 28px;
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-search {
      background-color: #3a7bd5;
      color: #fff;
      border: none;
      padding: 8px 24px;
      font-size: 12px;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .btn-recommended {
      background-color: transparent;
      color: #fff;
      border: 1.5px solid #fff;
      padding: 8px 22px;
      font-size: 12px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    /* SEARCH BAR ROW */
    .search-section {
      background-color: #fff;
      display: flex;
      align-items: center;
      padding: 14px 300px;
      gap: 100px;
    }

    .plan-label {
      font-size: 11px;
      font-weight: bold;
      color: #000;
      text-transform: uppercase;
      line-height: 1.55;
      min-width: 85px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .field label {
      font-size: 13px;
      color: #000;
      font-weight: bold;
    }

    .field input {
      border: 1px solid #bbb;
      padding: 5px 10px;
      font-size: 13px;
      width: 190px;
      color: #555;
      outline: none;
    }

    .btn-go {
      background-color: #2ecc71;
      color: #fff;
      border: none;
      padding: 7px 22px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    
    .dark-bar {
      background-color: #333333;
      height: 36px;
      width: 100%;
    }
  </style>
</head>
<body>


  <div class="navbar">
    <div class="logo">HAPPY TRAVELS</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Flights</a>
      <a href="#">Hotels</a>
      <a href="#">Packages</a>
      <a href="#">Contact Us</a>
    </nav>
  </div>

  
  <div class="hero">
    <h1>TRAVEL is MAGIC. TRAVEL is FUN</h1>
    <p>Plan your travel with us. Hassle free and memorable travel</p>
    <div class="hero-buttons">
      <button class="btn-search">SEARCH</button>
      <button class="btn-recommended">RECOMMENDED</button>
    </div>
  </div>

  <div class="search-section">
    <div class="plan-label">PLAN YOUR<br>HOLIDAYS</div>
    <div class="field">
      <label>Where</label>
      <input type="text" placeholder="Destination" />
    </div>
    <div class="field">
      <label>When</label>
      <input type="text" placeholder="Enter the Date" />
    </div>
    <button class="btn-go">Search</button>
  </div>

  <div class="dark-bar"></div>

</body>
</html>
