<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task List</title>
    <style>
        body{
            background-color: #2c3e50;
            margin:0;
            padding:0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container{
            /* background-color: #76c74d; */
            border:4px solid black;
            width:300px;
        }
        h2{
            background-color: #27ae60;
            color:white;
            padding:10px;
            margin:0;
            text-align: center;
            border-bottom:4px solid black;
        }
        ul{
            list-style-type: none;
            padding:0;
            margin:0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        li{
            display: flex;
            justify-content: space-between;
            padding:10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        li:nth-child(odd) {
            background-color: #2ecc71;
            color: white;
        }
        li:nth-child(even){
            background-color: #27ae;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>My Task List</h2>
        <ul>
            <li><b>JavaScript Lessons</b> <input type="checkbox"></li>
            <li><b>HTML + CSS Exercise </b><input type="checkbox"></li>
            <li><b>Complete Assignment </b><input type="checkbox"></li>
            <li><b>Watch a movie</b> <input type="checkbox"></li>
            <li><b>Practise English</b> <input type="checkbox"></li>
            <li><b>Read about Technology</b><input type="checkbox"></li>
            <li><b>Go to the gym</b> <input type="checkbox"></li>
            <li><b>Solve some aptitude qns</b> <input type="checkbox"></li>
        </ul>
    </div>
</body>
</html>
