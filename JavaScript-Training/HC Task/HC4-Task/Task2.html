<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            margin:0;
            background-color: #e0e0e0;;
            display: flex;
            justify-content: center;
            align-items:center;
            min-height: 100vh;
        }
        .container{
            background-color: #5a5a5a;
            width:300px;
            padding: 30px 20px 20px;
            text-align:center;
            color:white;
        }
        .container h2{
            margin:0 0 20px 0;
            font-size:20px;
            font-weight: bold;
            color:white;
        }
        .avatar{
            width:100px;
            height:100px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display:flex;
            align-items:center;
            justify-content: center;
            overflow:hidden;
        }
        label{
            display: block;
            /* margin-bottom: 0.5px; */
            font-size: 14px;
            color:white;
        }
        input[type="text"],input[type="password"]{
            width:80%;
            padding:5px 8px;
            /* margin-bottom:2px; */
            border:1px solid #ccc;
            background-color: #d9d9d9;
            font-size: 13px;
            outline:none;
        }
        input[type="submit"]{
            padding:5px 18px;
            background-color: #d9d9d9;
            border:1px solid #999;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 18px;
        }
        input[type="submit"]:hover{
            background-color: #c0c0c0;
        }
        .remember{
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
            font-size:16px;
            color:white;

        }
        .remember input[type="checkbox"]{
            width:13px;
            height:13px;
        }
        .footer{
            font-size: 11px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enter Login Details</h2>
        <div class="avatar">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNI-hhvFAbUrXvuW6-XpbU_cJHojzpdMZwbg&s">
        </div>
        <label>Email</label><br>
        <input type="text"><br><br>
        <label>Password</label><br>
        <input type="password"><br><br>
        <div class="remember">
            <input type="checkbox"> Remember me <br><br>
        </div>
        <input type="submit" value="Submit"><br>
        <div class="footer">
            &copy; All rights reserved.
        </div><br>
    </div>
</body>
</html>
