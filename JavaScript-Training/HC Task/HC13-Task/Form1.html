<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4" style="max-width:550px;">
  <form>
    <div class="mb-3">
      <label for="email1" class="form-label">Email address</label>
      <input type="email" class="form-control" id="email1" placeholder="Enter email"/>
      <small class="form-text text-muted">We'll never share your email.</small>
    </div>
    <div class="mb-3">
      <label for="pwd1" class="form-label">Password</label>
      <input type="password" class="form-control" id="pwd1" placeholder="Password"/>
    </div>
    <div class="form-check mb-1">
      <input class="form-check-input" type="radio" name="gender" id="gender1" value="Male"/>
      <label class="form-check-label" for="gender1">Male</label>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="radio" name="gender" id="gender2" value="Female"/>
      <label class="form-check-label" for="gender2">Female</label>
    </div>
    <div class="mb-3">
      <label for="profession" class="form-label">Profession</label>
      <select class="form-control" id="profession">
        <option>Working in a company</option>
        <option>Self Employed</option>
        <option>Student</option>
      </select>
    </div>
    <div class="form-check mb-1">
      <input class="form-check-input" type="checkbox" id="promoMails"/>
      <label class="form-check-label" for="promoMails">Receive promotional mails</label>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="prodUpdates"/>
      <label class="form-check-label" for="prodUpdates">Receive product updates</label>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>
</body>
</html>
