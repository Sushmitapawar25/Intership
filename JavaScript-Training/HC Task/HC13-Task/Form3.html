<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form 3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4 p-2">
  <form>
    <div class="row mb-3">
      <div class="col-md-6 mb-3 mb-md-0">
        <label for="email11" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email11" placeholder="Enter email"/>
        <small class="form-text text-muted">We'll never share your email.</small>
      </div>
      <div class="col-md-6">
        <label for="pwd11" class="form-label">Password</label>
        <input type="password" class="form-control" id="pwd11" placeholder="Password"/>
      </div>
    </div>
    <div class="form-check form-check-inline mb-3">
      <input class="form-check-input" type="radio" name="gender3" id="gender21" value="Male" checked/>
      <label class="form-check-label" for="gender21">Male</label>
    </div>
    <div class="form-check form-check-inline mb-3">
      <input class="form-check-input" type="radio" name="gender3" id="gender22" value="Female"/>
      <label class="form-check-label" for="gender22">Female</label>
    </div>
    <div class="mb-3">
      <label for="profession3" class="form-label">Profession</label>
      <select class="form-control" id="profession3">
        <option>Working in a company</option>
        <option>Self Employed</option>
        <option>Student</option>
      </select>
    </div>
    <div class="form-check mb-1">
      <input class="form-check-input" type="checkbox" id="promoMails3"/>
      <label class="form-check-label" for="promoMails3">Receive promotional mails</label>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="prodUpdates3"/>
      <label class="form-check-label" for="prodUpdates3">Receive product updates</label>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>
</body>
</html>
