<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4" style="max-width:650px;">
  <form>
    <div class="form-group row mb-3">
      <label for="inputEmail1" class="col-sm-2 col-form-label">Email</label>
      <div class="col-sm-10">
        <input type="email" class="form-control" id="inputEmail1" placeholder="Email"/>
        <small id="emailHelp" class="form-text text-muted">We'll never share your email.</small>
      </div>
    </div>
    <div class="form-group row mb-3">
      <label for="inputPassword1" class="col-sm-2 col-form-label">Password</label>
      <div class="col-sm-10">
        <input type="password" class="form-control" id="inputPassword1" placeholder="Password"/>
      </div>
    </div>
    <fieldset class="form-group mb-3">
      <div class="row">
        <legend class="col-form-label col-sm-2 pt-0">Gender</legend>
        <div class="col-sm-10">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="gender" id="genderRadio1" value="Male"/>
            <label class="form-check-label" for="genderRadio1">Male</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="gender" id="genderRadio2" value="Female"/>
            <label class="form-check-label" for="genderRadio2">Female</label>
          </div>
        </div>
      </div>
    </fieldset>
    <div class="form-group row mb-1">
      <div class="col-sm-2"></div>
      <div class="col-sm-10">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="promoCheck"/>
          <label class="form-check-label" for="promoCheck">Receive promotional mails</label>
        </div>
      </div>
    </div>
    <div class="form-group row mb-3">
      <div class="col-sm-2"></div>
      <div class="col-sm-10">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="prodCheck"/>
          <label class="form-check-label" for="prodCheck">Receive product updates</label>
        </div>
      </div>
    </div>
    <div class="form-group row mb-3">
      <div class="col-sm-2"></div>
      <div class="col-sm-10">
        <button type="submit" class="btn btn-primary w-100">Sign in</button>
      </div>
    </div>
  </form>
</div>
</body>
</html>
