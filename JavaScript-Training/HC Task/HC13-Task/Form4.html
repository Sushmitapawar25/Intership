<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form 4</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4" style="max-width:650px;">
  <form>

    <h5 class="fw-bold mb-3">Customer Details</h5>
    <div class="row mb-3">
      <div class="col-md-6 mb-3 mb-md-0">
        <label class="form-label">First name</label>
        <input type="text" class="form-control"/>
      </div>
      <div class="col-md-6">
        <label class="form-label">Last name</label>
        <input type="text" class="form-control"/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="myemail@example.com"/>
    </div>
    <div class="mb-4">
      <label class="form-label">Mobile</label>
      <input type="tel" class="form-control"/>
    </div>

    <h5 class="fw-bold mb-3">Billing address</h5>
    <div class="mb-3">
      <label class="form-label">Address</label>
      <input type="text" class="form-control"/>
    </div>
    <div class="row mb-3">
      <div class="col-md-4 mb-3 mb-md-0">
        <label class="form-label">City</label>
        <select class="form-control">
          <option>Choose...</option>
          <option>Mumbai</option>
          <option>Pune</option>
        </select>
      </div>
      <div class="col-md-4 mb-3 mb-md-0">
        <label class="form-label">State</label>
        <select class="form-control">
          <option>Choose...</option>
          <option>Maharashtra</option>
          <option>Karnataka</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Pincode</label>
        <input type="text" class="form-control"/>
      </div>
    </div>
    <div class="form-check mb-1">
      <input class="form-check-input" type="checkbox" id="shippingCheck"/>
      <label class="form-check-label" for="shippingCheck">Shipping address is the same as my billing address</label>
    </div>
    <div class="form-check mb-4">
      <input class="form-check-input" type="checkbox" id="saveInfo"/>
      <label class="form-check-label" for="saveInfo">Save this information</label>
    </div>

    <h5 class="fw-bold mb-3">Payment</h5>
    <div class="form-check mb-1">
      <input class="form-check-input" type="radio" name="payment" id="creditCard"/>
      <label class="form-check-label" for="creditCard">Credit card</label>
    </div>
    <div class="form-check mb-1">
      <input class="form-check-input" type="radio" name="payment" id="debitCard"/>
      <label class="form-check-label" for="debitCard">Debit card</label>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="radio" name="payment" id="netBanking"/>
      <label class="form-check-label" for="netBanking">Net Banking</label>
    </div>
    <div class="row mb-3">
      <div class="col-md-6 mb-3 mb-md-0">
        <label class="form-label">Name on card</label>
        <input type="text" class="form-control"/>
        <small class="text-muted">Full name as displayed on card</small>
      </div>
      <div class="col-md-6">
        <label class="form-label">Credit card number</label>
        <input type="text" class="form-control"/>
      </div>
    </div>
    <div class="row mb-4">
      <div class="col-md-6 mb-3 mb-md-0">
        <label class="form-label">Expiration</label>
        <input type="text" class="form-control"/>
      </div>
      <div class="col-md-6">
        <label class="form-label">CVV</label>
        <input type="text" class="form-control"/>
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">Continue to checkout</button>
  </form>
</div>
</body>
</html>
