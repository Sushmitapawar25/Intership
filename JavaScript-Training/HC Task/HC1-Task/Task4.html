<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form page</title>
    <style>
        .l1{
            display: inline-block;
            width: 150px;
        }
    </style>
</head>
<body>
    <form>
        <label class="l1">Name:</label>
        <input type="text"><br><br>
        <label class="l1">Address:</label>
        <input type="text"><br><br>
        <lable class="l1">City:</lable>
        <input type="text"><br><br>
        <label class="l1">State:</label>
        <input type="text"><br><br>
        <label class="l1">Pincode:</label>
        <input type="number"><br><br>
        <lable class="l1">Magazine:</lable>
        <select>
            <option>India Today</option>
            <option>Times</option>
            <option>Lokmat</option>
        </select>
        <br><br>
        <label class="l1">Subscription:</label>
        <input type="radio" name="sub">1 year
        <input type="radio" name="sub">2 year
        <br><br>
        <label>Additional Comments:</label><br>
        <textarea rows="5" cols="40"></textarea>
        <br><br>
        <input type="submit" value="Send Your Order">
    </form>
</body>
</html>
