<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertising Form</title>
    <style>
        .container{
            width: 400px;
            border: 1px solid gray;
            padding:20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Adevertising Form</h1>
        <label>Name / Comapany name *</label><br>
        <input type="text"><br><br>
        <label>Email *</label><br>
        <input type="text"><br>
        <p>Advertising Size (pixels)</p>
        <input type="radio" name="size">Option 1<br>
        <input type="radio" name="size">Option 2<br>
        <input type="radio" name="size">Option 3
        <br>
        <p>Which sites would you like to advertise on?</p>
        <input type="checkbox" name="check"> Option 1<br>
        <input type="checkbox" name="check"> Option 2<br>
        <input type="checkbox" name="check"> Option 3
        <br><br>
        <label>Comments</label><br>
        <textarea rows="5" cols="18"></textarea><br><br>
        <button>Submit</button>
    </div>
    
</body>
</html>
