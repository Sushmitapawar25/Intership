<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Food Delivery Survey</title>
  <style>
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #c8e6a0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      min-height: 100vh;
    }

    h1 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: black;
    }

    .form-box {
      background-color: #f0f0f0;
      padding: 30px 40px;
      width: 100%;
      max-width: 520px;
    }

    .form-box h2 {
      text-align: center;
      font-size: 15px;
      margin-bottom: 20px;
      color: #333;
    }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      gap: 30px;
    }

    .form-row label {
      min-width: 180px;
      font-size: 13px;
      text-align: right;
      color: #000;
    }

    .form-row input[type="text"],
    .form-row input[type="email"],
    .form-row select,
    .form-row textarea {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #bbb;
      font-size: 13px;
      outline: none;
      background: white;
    }

    .form-row textarea {
      height: 60px;
      resize: vertical;
    }

    .radio-block {
      display: flex;
      margin-bottom: 14px;
      gap: 30px;
    }
    .check-block{
        display: flex;
        margin-bottom: 14px;
        gap: 15px;
    }

    .radio-block label.main-label,
    .check-block label.main-label {
      min-width: 180px;
      font-size: 13px;
      text-align: right;
      color: #000;
      padding-top: 2px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .btn-submit {
      display: block;
      margin: 16px auto 0;
      background-color: #4a90d9;
      color: white;
      border: none;
      padding: 8px 28px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Food delivery Survey Form</h1>

  <div class="form-box">
    <h2>Tell us about yourself</h2>

    <div class="form-row">
      <label>Name</label>
      <input type="text" placeholder="Enter your name" />
    </div>

    <div class="form-row">
      <label>Email</label>
      <input type="email" placeholder="Enter your email address" />
    </div>

    <div class="form-row">
      <label>What do you do</label>
      <select>
        <option>Student</option>
        <option>Working Professional</option>
        <option>Other</option>
      </select>
    </div>

    <div class="radio-block">
      <label class="main-label">What is your preferred time</label>
      <div class="options">
        <label><input type="radio" name="time" /> Morning</label>
        <label><input type="radio" name="time" /> Afternoon</label>
        <label><input type="radio" name="time" /> Evening</label>
      </div>
    </div>

    <div class="check-block">
      <label class="main-label">Which meals do you order online?<br><span style="font-size:11px;">(Select all options that apply)</span></label>
      <div class="options">
        <label><input type="checkbox" /> Breakfast</label>
        <label><input type="checkbox" /> Lunch</label>
        <label><input type="checkbox" /> Snacks</label>
        <label><input type="checkbox" /> Dinner</label>
      </div>
    </div>

    <div class="form-row">
      <label>Anything you would like to share</label>
      <textarea placeholder="Enter your experience here..."></textarea>
    </div>

    <button class="btn-submit">Submit</button>
  </div>

</body>
</html>
