<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2.3</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <div class="container">
        <div id="show"></div>
    </div>

    <script>

        const employees = [
            { name: 'Anna', email: 'Anna45@email.com', age: 27, dept: 'Technology', gradCourse: 'B.Tech', gradYear: 2015, gradPerf: 'Good', postgrad: false, workBefore: true, workEx: '0-1 year' },
            { name: 'John', email: 'john@email.com', age: 24, dept: 'Technology', gradCourse: 'B.Tech', gradYear: 2015, gradPerf: 'Good', postgrad: false, workBefore: false, workEx: 'None' },
            { name: 'Edwards', email: 'edwards@email.com', age: 29, dept: 'Accounts', gradCourse: 'B.Com', gradYear: 2015, gradPerf: 'Excellent', postgrad: true, workBefore: true, workEx: '3+ years' },
            { name: 'Julia', email: 'julia@email.com', age: 28, dept: 'Technology', gradCourse: 'B.Tech', gradYear: 2015, gradPerf: 'Excellent', postgrad: true, workBefore: true, workEx: '1-3 years' },
        ];

        const departments = ['HR', 'Accounts', 'Operations', 'Technology'];

        const expenses = [
            { name: 'John', category: 'Local Travel', billId: 'NP7561', amount: 64, payment: 'Self', approved: true },
            { name: 'Anna', category: 'Communication', billId: 'BN8561', amount: 39, payment: 'Self', approved: false },
            { name: 'Edwards', category: 'Local Travel', billId: 'AT5461', amount: 58, payment: 'Corporate Card', approved: true },
            { name: 'Julia', category: 'Local Travel', billId: 'RR5492', amount: 71, payment: 'Self', approved: true },
            { name: 'Julia', category: 'Out of City Travel', billId: 'KT8785', amount: 277, payment: 'Bill to Company', approved: true },
            { name: 'Edwards', category: 'Others', billId: 'UR0400', amount: 25, payment: 'Corporate Card', approved: false },
            { name: 'Edwards', category: 'Out of City Travel', billId: 'CC6586', amount: 305, payment: 'Corporate Card', approved: false },
            { name: 'Julia', category: 'Communication', billId: 'DL3425', amount: 43, payment: 'Self', approved: false },
            { name: 'Julia', category: 'Out of City Travel', billId: 'MW65775', amount: 248, payment: 'Bill to Company', approved: true },
            { name: 'Edwards', category: 'Others', billId: 'JR56732', amount: 52, payment: 'Corporate Card', approved: true },
            { name: 'Julia', category: 'Out of City Travel', billId: 'BK0074', amount: 405, payment: 'Bill to Company', approved: false },
            { name: 'Edwards', category: 'Communication', billId: 'JR56732', amount: 72, payment: 'Corporate Card', approved: true },
        ];

        let editIndex = -1;
        let myemployee = {};
        let errors = {};
        let isCardView = false;
        let detailIndex = null;

        show();

        function show(active = 1) {
            let str = makeNavbar(active);
            active === 1 ? str += showEmployeeTable() : str += '';
            active === 2 ? str += showEmployeeForm() : str += '';
            active === 3 ? str += showDepartments() : str += '';
            active === 4 ? str += showDeptForm() : str += '';
            active === 5 ? str += showExpenses() : str += '';
            document.getElementById('show').innerHTML = str;
        }

        function showEmployees() {
            editIndex = -1; myemployee = {}; errors = {}; isCardView = false; detailIndex = null;
            show(1);
        }
        function addEmployeePage() { show(2); }
        function showDepartmentPage() { show(3); }
        function addDeptPage() { show(4); }
        function showExpensesPage() { show(5); }

        function sort(colNo) {
            switch (colNo) {
                case 0: employees.sort((e1, e2) => e1.name.localeCompare(e2.name)); break;
                case 1: employees.sort((e1, e2) => e1.email.localeCompare(e2.email)); break;
                case 2: employees.sort((e1, e2) => (+e1.age) - (+e2.age)); break;
                case 3: employees.sort((e1, e2) => e1.dept.localeCompare(e2.dept)); break;
                case 4: employees.sort((e1, e2) => e1.gradCourse.localeCompare(e2.gradCourse)); break;
                case 5: employees.sort((e1, e2) => e1.workEx.localeCompare(e2.workEx)); break;
            }
            show(1);
        }

        function deleteEmployee(index) { employees.splice(index, 1); showEmployees(); }
        function editEmployee(index) { editIndex = index; myemployee = employees[index]; errors = {}; addEmployeePage(); }

        function showEmployeeTable() {
            if (isCardView) return showCardView();
            const arr = employees.map((emp, index) => {
                let str = '<div class="row border">';
                str += '<div class="col p-2">' + emp.name + '</div>';
                str += '<div class="col p-2">' + emp.email + '</div>';
                str += '<div class="col p-2">' + emp.age + '</div>';
                str += '<div class="col p-2">' + emp.dept + '</div>';
                str += '<div class="col p-2">' + emp.gradCourse + '</div>';
                str += '<div class="col p-2">' + emp.workEx + '</div>';
                str += '<div class="col p-2">';
                str += '<i class="fas fa-edit text-primary mr-2" style="cursor:pointer" onclick="editEmployee(' + index + ')" title="Edit"></i>';
                str += '<i class="fas fa-trash text-danger mr-2" style="cursor:pointer" onclick="deleteEmployee(' + index + ')" title="Delete"></i>';
                str += '<i class="fas fa-car text-success" style="cursor:pointer" title="Show Expenses"></i>';
                str += '</div>';
                str += '</div>';
                return str;
            });
            let table = '<h3 class="text-center mb-3">List of Persons</h3>';
            table += '<div class="row bg-dark text-white font-weight-bold">';
            table += '<div class="col p-2" style="cursor:pointer" onclick="sort(0)">Name</div>';
            table += '<div class="col p-2" style="cursor:pointer" onclick="sort(1)">Email</div>';
            table += '<div class="col p-2" style="cursor:pointer" onclick="sort(2)">Age</div>';
            table += '<div class="col p-2" style="cursor:pointer" onclick="sort(3)">Dept</div>';
            table += '<div class="col p-2" style="cursor:pointer" onclick="sort(4)">Graduation</div>';
            table += '<div class="col p-2" style="cursor:pointer" onclick="sort(5)">Work Exp</div>';
            table += '<div class="col p-2"></div>';
            table += '</div>';
            table += arr.join('');
            table += '<button class="btn btn-primary mt-3" onclick="changeView()">Change View</button>';
            return table;
        }

        function showEmployeeForm() {
            let name = myemployee.name || '';
            let email = myemployee.email || '';
            let age = myemployee.age || '';
            let dept = myemployee.dept || '';
            let gradCourse = myemployee.gradCourse || '';
            let gradYear = myemployee.gradYear || '';
            let gradPerf = myemployee.gradPerf || '';
            let postgrad = myemployee.postgrad || false;
            let workBefore = myemployee.workBefore || false;
            let workEx = myemployee.workEx || '';
            let title = editIndex >= 0 ? 'Edit Employee Details' : 'Add a New Employee';
            let str = '<h3 class="text-center mb-3">' + title + '</h3>';
            str += makeTextField('empName', 'Employee Name', 'Enter the Employee Name', name, errors.name);
            str += makeTextField('email', 'Email', 'Enter the Email id', email, errors.email);
            str += makeTextField('age', 'Age', 'Enter the Age', age, errors.age);
            str += '<div class="form-group">';
            str += '<label>Department</label>';
            str += '<select class="form-control" id="dept">';
            str += '<option value="" ' + (dept ? '' : 'selected') + ' disabled>Select the Department</option>';
            departments.forEach(d => { let sel = d === dept ? 'selected' : ''; str += '<option ' + sel + '>' + d + '</option>'; });
            str += '</select>';
            str += errors.dept ? '<span class="text-danger">' + errors.dept + '</span>' : '';
            str += '</div>';
            str += makeTextField('grad', 'Graduation Degree', 'What degree did you get in graduation', gradCourse, '');
            str += '<div class="form-group">';
            str += '<label>Graduation Year</label>';
            str += '<select class="form-control" id="gradYear">';
            str += '<option value="" disabled ' + (gradYear ? '' : 'selected') + '>Select the Graduation Year</option>';
            for (let y = 2000; y <= 2020; y++) { let sel = (+gradYear === y) ? 'selected' : ''; str += '<option ' + sel + '>' + y + '</option>'; }
            str += '</select>';
            str += '</div>';
            str += '<div class="form-group"><label>Overall Grade in Graduation</label><div>';
            [{ label: 'A', value: 'Excellent' }, { label: 'B', value: 'Good' }, { label: 'C', value: 'Average' }, { label: 'D', value: 'Poor' }].forEach(g => {
                let chk = gradPerf === g.value ? 'checked' : '';
                str += '<input type="radio" name="grade" value="' + g.value + '" ' + chk + '> ' + g.label + ' &nbsp;';
            });
            str += '</div></div>';
            str += '<div class="form-check mb-2"><input type="checkbox" class="form-check-input" id="postgrad" ' + (postgrad ? 'checked' : '') + ' ><label class="form-check-label" for="postgrad">Are you a post graduate</label></div>';
            str += '<div class="form-check mb-2"><input type="checkbox" class="form-check-input" id="priorWork" ' + (workBefore ? 'checked' : '') + ' ><label class="form-check-label" for="priorWork">Do you have prior work experience</label></div>';
            str += '<div class="form-group"><label>Years of Work Experience</label><div>';
            ['None', '0-1 year', '1-3 years', '3+ years'].forEach(w => {
                let chk = workEx === w ? 'checked' : '';
                str += '<input type="radio" name="workyr" value="' + w + '" ' + chk + '> ' + w + ' &nbsp;';
            });
            str += '</div>';
            str += errors.workEx ? '<br><span class="text-danger">' + errors.workEx + '</span>' : '';
            str += '</div>';
            str += '<button class="btn btn-primary" onclick="submitEmployee()">Submit</button>';
            return str;
        }

        function submitEmployee() {
            let name = document.getElementById('empName').value;
            let email = document.getElementById('email').value;
            let age = document.getElementById('age').value;
            let dept = document.getElementById('dept').value;
            let gradCourse = document.getElementById('grad').value;
            let gradYear = document.getElementById('gradYear').value;
            let gradeEl = document.querySelector('input[name="grade"]:checked');
            let postgrad = document.getElementById('postgrad').checked;
            let workBefore = document.getElementById('priorWork').checked;
            let workEl = document.querySelector('input[name="workyr"]:checked');
            let emp = { name: name, email: email, age: age, dept: dept, gradCourse: gradCourse, gradYear: gradYear, gradPerf: gradeEl ? gradeEl.value : '', postgrad: postgrad, workBefore: workBefore, workEx: workEl ? workEl.value : '' };
            if (validate(emp)) { editIndex >= 0 ? employees[editIndex] = emp : employees.push(emp); showEmployees(); }
            else { myemployee = emp; addEmployeePage(); }
        }

        function validate(emp) {
            errors.name = emp.name ? '' : 'Name is mandatory';
            errors.email = emp.email ? '' : 'Email is mandatory';
            errors.age = emp.age ? '' : 'Age is mandatory';
            errors.dept = emp.dept ? '' : 'Select the Department';
            errors.workEx = emp.workEx ? '' : 'Choose the applicable work experience';
            return !(errors.name || errors.email || errors.age || errors.dept || errors.workEx);
        }


        function showExpenses() {
            let str = '<h3 class="text-center mb-3">List of Expenses for All Employees</h3>';
            str += '<div class="row bg-dark text-white font-weight-bold">';
            str += '<div class="col p-2">Name</div>';
            str += '<div class="col p-2">Category</div>';
            str += '<div class="col p-2">Bill Id</div>';
            str += '<div class="col p-2">Amount</div>';
            str += '<div class="col p-2">Payment</div>';
            str += '<div class="col p-2">Approved</div>';
            str += '<div class="col p-2"></div>';
            str += '</div>';
            expenses.forEach((exp, index) => {
                str += '<div class="row border">';
                str += '<div class="col p-2">' + exp.name + '</div>';
                str += '<div class="col p-2">' + exp.category + '</div>';
                str += '<div class="col p-2">' + exp.billId + '</div>';
                str += '<div class="col p-2">' + exp.amount + '</div>';
                str += '<div class="col p-2">' + exp.payment + '</div>';
                str += '<div class="col p-2">' + exp.approved + '</div>';
                str += '<div class="col p-2">';

                if (!exp.approved) {
                    str += '<button class="btn btn-primary btn-sm" onclick="approveExpense(' + index + ')">Approve</button>';
                }
                str += '</div>';
                str += '</div>';
            });
            return str;
        }


        function approveExpense(index) {
            expenses[index].approved = true;
            showExpensesPage();
        }

        function changeView() { isCardView = true; detailIndex = null; show(1); }

        function showCardView() {
            let str = '<h3 class="text-center mb-3">List of Persons</h3>';
            str += '<div class="row">';
            employees.forEach((emp, i) => {
                str += '<div class="col-3 border p-2 mb-2">';
                str += '<div><b class="text-danger">Name :</b> ' + emp.name + '</div>';
                str += '<div><b class="text-danger">Email :</b> ' + emp.email + '</div>';
                str += '<div><b class="text-danger">Age :</b> ' + emp.age + '</div>';
                str += '<div><b class="text-danger">Dept :</b> ' + emp.dept + '</div>';
                if (detailIndex === i) {
                    str += '<div><b class="text-danger">Graduation :</b> ' + emp.gradCourse + '</div>';
                    str += '<div><b class="text-danger">Year of Graduation :</b> ' + emp.gradYear + '</div>';
                    str += '<div><b class="text-danger">Performance :</b> ' + emp.gradPerf + '</div>';
                    str += '<div><b class="text-danger">Post Graduate :</b> ' + emp.postgrad + '</div>';
                    str += '<div><b class="text-danger">Worked Before :</b> ' + emp.workBefore + '</div>';
                    str += '<div><b class="text-danger">Work Experience :</b> ' + emp.workEx + '</div>';
                }
                str += '<button class="btn btn-success btn-sm mt-2" onclick="showMoreDetails(' + i + ')">More Details</button>';
                str += '</div>';
            });
            str += '</div>';
            str += '<button class="btn btn-secondary mt-3" onclick="showEmployees()">Original View</button>';
            return str;
        }

        function showMoreDetails(index) { isCardView = true; detailIndex = detailIndex === index ? null : index; show(1); }

        function showDepartments() {
            if (departments.length === 0) return '<h5>No department has been defined</h5>';
            let str = '<h3 class="text-center mb-3">List of Departments</h3>';
            str += departments.map(d => '<div class="border p-2">' + d + '</div>').join('');
            return str;
        }

        function showDeptForm() {
            let str = makeTextField('deptName', 'Department Name', 'Enter Department Name');
            str += '<button class="btn btn-primary" onclick="submitDept()">Submit</button>';
            return str;
        }

        function submitDept() {
            let dept = document.getElementById('deptName').value;
            if (!dept) { alert('Enter a department name.'); return; }
            departments.push(dept);
            showDepartmentPage();
        }

        function makeTextField(id, label, placeholder = '', value = '', err = '') {
            let str = '<div class="form-group">';
            str += '<label>' + label + '</label>';
            str += '<input type="text" class="form-control" id="' + id + '" placeholder="' + placeholder + '" value="' + value + '">';
            str += err ? '<span class="text-danger">' + err + '</span>' : '';
            str += '</div>';
            return str;
        }

        function makeNavbar(active = 1) {
            let a1 = active === 1 ? 'active' : '', a2 = active === 2 ? 'active' : '', a3 = active === 3 ? 'active' : '', a4 = active === 4 ? 'active' : '', a5 = active === 5 ? 'active' : '';
            let str = '<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">';
            str += '<a class="navbar-brand" href="#">Employee System</a>';
            str += '<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">';
            str += '<span class="navbar-toggler-icon"></span></button>';
            str += '<div class="collapse navbar-collapse show" id="navbarNav">';
            str += '<ul class="navbar-nav">';
            str += '<li class="nav-item ' + a1 + '"><a class="nav-link" href="#" onclick="showEmployees()">Show Employees</a></li>';
            str += '<li class="nav-item ' + a2 + '"><a class="nav-link" href="#" onclick="addEmployeePage()">Add an Employee</a></li>';
            str += '<li class="nav-item ' + a3 + '"><a class="nav-link" href="#" onclick="showDepartmentPage()">Departments</a></li>';
            str += '<li class="nav-item ' + a4 + '"><a class="nav-link" href="#" onclick="addDeptPage()">Add a Dept</a></li>';
            str += '<li class="nav-item ' + a5 + '"><a class="nav-link" href="#" onclick="showExpensesPage()">Expenses</a></li>';
            str += '</ul></div></nav>';
            return str;
        }

    </script>
</body>

</html>
