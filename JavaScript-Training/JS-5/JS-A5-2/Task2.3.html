<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2.3</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container mt-4">
    <div id="show"></div>
</div>

<script>

const employees = [
    {name:'Anna',email:'Anna45@email.com',age:27,dept:'Technology',gradCourse:'B.Tech',gradYear:2015,gradPerf:'Good',postgrad:false,workBefore:true,workEx:'0-1 year'},
    {name:'Mary',email:'mary16@email.com',age:30,dept:'Accounts',gradCourse:'B.Com',gradYear:2015,gradPerf:'Good',postgrad:true,workBefore:false,workEx:'None'},
    {name:'Jack',email:'jack@email.com',age:33,dept:'Operations',gradCourse:'BA',gradYear:2015,gradPerf:'Average',postgrad:false,workBefore:true,workEx:'3+ years'},
    {name:'John',email:'john@email.com',age:24,dept:'Technology',gradCourse:'B.Tech',gradYear:2015,gradPerf:'Good',postgrad:false,workBefore:false,workEx:'None'},
    {name:'Edwards',email:'edwards@email.com',age:29,dept:'Accounts',gradCourse:'B.Com',gradYear:2015,gradPerf:'Excellent',postgrad:true,workBefore:true,workEx:'3+ years'},
    {name:'Tim',email:'tim001@email.com',age:31,dept:'Operations',gradCourse:'BSc',gradYear:2015,gradPerf:'Average',postgrad:false,workBefore:true,workEx:'0-1 year'},
    {name:'Julia',email:'julia@email.com',age:28,dept:'Technology',gradCourse:'B.Tech',gradYear:2015,gradPerf:'Excellent',postgrad:true,workBefore:true,workEx:'1-3 years'},
    {name:'Steve',email:'steve@email.com',age:25,dept:'Operations',gradCourse:'BA',gradYear:2015,gradPerf:'Good',postgrad:false,workBefore:true,workEx:'0-1 year'},
    {name:'Sam',email:'sam77@email.com',age:33,dept:'HR',gradCourse:'BBA',gradYear:2015,gradPerf:'Good',postgrad:false,workBefore:true,workEx:'1-3 years'}
];

const departments = ['HR','Accounts','Operations','Technology'];

let isCardView = false;
let detailIndex = null;

show();

function show(active=1){
    let str = makeNavbar(active);
    active===1 ? str += showEmployeeTable() : str += '';
    active===2 ? str += showEmployeeForm() : str += '';
    active===3 ? str += showDepartments() : str += '';
    active===4 ? str += showDeptForm() : str += '';
    document.getElementById('show').innerHTML = str;
}

function showEmployees(){
    isCardView = false;
    detailIndex = null;
    show(1);
}

function addEmployeePage(){
    show(2);
}

function showDepartmentPage(){
    show(3);
}

function addDeptPage(){
    show(4);
}

// Sort Function
function sort(colNo){
    switch(colNo){
        case 0 : employees.sort((e1,e2) => e1.name.localeCompare(e2.name)); break;
        case 1 : employees.sort((e1,e2) => e1.email.localeCompare(e2.email)); break;
        case 2 : employees.sort((e1,e2) => (+e1.age) - (+e2.age)); break;
        case 3 : employees.sort((e1,e2) => e1.dept.localeCompare(e2.dept)); break;
        case 4 : employees.sort((e1,e2) => e1.gradCourse.localeCompare(e2.gradCourse)); break;
        case 5 : employees.sort((e1,e2) => e1.workEx.localeCompare(e2.workEx)); break;
    }
    show(1);
}

function showEmployeeTable(){

    if(isCardView){
        return showCardView();
    }

    const arr = employees.map(emp => {
        let str = '<div class="row border">';
        str += '<div class="col p-2">'+emp.name+'</div>';
        str += '<div class="col p-2">'+emp.email+'</div>';
        str += '<div class="col p-2">'+emp.age+'</div>';
        str += '<div class="col p-2">'+emp.dept+'</div>';
        str += '<div class="col p-2">'+emp.gradCourse+'</div>';
        str += '<div class="col p-2">'+emp.workEx+'</div>';
        str += '</div>';
        return str;
    });

    let table = '<h3 class="text-center mb-3">List of Persons</h3>';
    table += '<div class="row bg-dark text-white font-weight-bold">';
    table += '<div class="col p-2" style="cursor:pointer" onclick="sort(0)">Name</div>';
    table += '<div class="col p-2" style="cursor:pointer" onclick="sort(1)">Email</div>';
    table += '<div class="col p-2" style="cursor:pointer" onclick="sort(2)">Age</div>';
    table += '<div class="col p-2" style="cursor:pointer" onclick="sort(3)">Dept</div>';
    table += '<div class="col p-2" style="cursor:pointer" onclick="sort(4)">Graduation</div>';
    table += '<div class="col p-2" style="cursor:pointer" onclick="sort(5)">Work Exp</div>';
    table += '</div>';
    table += arr.join('');

    table += '<button class="btn btn-primary mt-3" onclick="changeView()">Change View</button>';

    return table;
}

function changeView(){
    isCardView = true;
    detailIndex = null;
    show(1);
}

function showCardView(){
    let str = '<h3 class="text-center mb-3">List of Persons</h3>';
    str += '<div class="row">';

    employees.forEach((emp, i) => {
        str += '<div class="col-3 border p-2 mb-2">';
        str += '<div><b class="text-danger">Name :</b> '+emp.name+'</div>';
        str += '<div><b class="text-danger">Email :</b> '+emp.email+'</div>';
        str += '<div><b class="text-danger">Age :</b> '+emp.age+'</div>';
        str += '<div><b class="text-danger">Dept :</b> '+emp.dept+'</div>';

        if(detailIndex === i){
            str += '<div><b class="text-danger">Graduation :</b> '+emp.gradCourse+'</div>';
            str += '<div><b class="text-danger">Year of Graduation :</b>'+emp.gradYear+'</div>';
            str += '<div><b class="text-danger">Performance in Graduation :</b> '+emp.gradPerf+'</div>';
            str += '<div><b class="text-danger">Post Graduate :</b> '+emp.postgrad+'</div>';
            str += '<div><b class="text-danger">Worked Before :</b> '+emp.workBefore+'</div>';
            str += '<div><b class="text-danger">Work Experience :</b> '+emp.workEx+'</div>';
        }

        str += '<button class="btn btn-success btn-sm mt-2" onclick="showMoreDetails('+i+')">More Details</button>';
        str += '</div>';
    });

    str += '</div>';

    str += '<button class="btn btn-secondary mt-3" onclick="showEmployees()">Original View</button>';

    return str;
}

function showMoreDetails(index){
    isCardView = true;

    if(detailIndex === index){
        detailIndex = null;
    } else {
        detailIndex = index;
    }
    show(1);
}
function showEmployeeForm(){
    let str = '';

    str += makeTextField('empName', 'Employee Name', 'Enter the Employee Name');
    str += makeTextField('email', 'Email', 'Enter the Email id');
    str += makeTextField('age', 'Age', 'Enter the Age');

    // Department dropdown
    str += '<div class="form-group">';
    str += '<label>Department</label>';
    str += '<select class="form-control" id="dept">';
    str += '<option value="">Select the Department</option>';
    departments.forEach(d => {
        str += '<option value="'+d+'">'+d+'</option>';
    });
    str += '</select>';
    str += '</div>';

    str += makeTextField('grad', 'Graduation Degree', 'What degree did you get in graduation');

    // Graduation Year dropdown 2000 to 2020
    str += '<div class="form-group">';
    str += '<label>Graduation Year</label>';
    str += '<select class="form-control" id="gradYear">';
    str += '<option value="">Select the Graduation Year</option>';
    for(let y=2000; y<=2020; y++){
        str += '<option value="'+y+'">'+y+'</option>';
    }
    str += '</select>';
    str += '</div>';

    // Grade radios A=Excellent B=Good C=Average D=Poor
    str += '<div class="form-group">';
    str += '<label>Overall Grade in Graduation</label>';
    str += '<div>';
    str += '<input type="radio" name="grade" value="Excellent"> A &nbsp;';
    str += '<input type="radio" name="grade" value="Good"> B &nbsp;';
    str += '<input type="radio" name="grade" value="Average"> C &nbsp;';
    str += '<input type="radio" name="grade" value="Poor"> D';
    str += '</div>';
    str += '</div>';

    // Checkboxes
    str += '<div class="form-check mb-2">';
    str += '<input type="checkbox" class="form-check-input" id="postgrad">';
    str += '<label class="form-check-label" for="postgrad">Are you a post graduate</label>';
    str += '</div>';

    str += '<div class="form-check mb-2">';
    str += '<input type="checkbox" class="form-check-input" id="priorWork">';
    str += '<label class="form-check-label" for="priorWork">Do you have prior work experience</label>';
    str += '</div>';

    // Work Experience radios
    str += '<div class="form-group">';
    str += '<label>Years of Work Experience</label>';
    str += '<div>';
    str += '<input type="radio" name="workyr" value="None"> None &nbsp;';
    str += '<input type="radio" name="workyr" value="0-1 year"> 0-1 year &nbsp;';
    str += '<input type="radio" name="workyr" value="1-3 years"> 1-3 years &nbsp;';
    str += '<input type="radio" name="workyr" value="3+ years"> 3+ years';
    str += '</div>';
    str += '</div>';

    str += '<button class="btn btn-primary" onclick="submitEmployee()">Submit</button>';
    return str;
}

function submitEmployee(){
    let name     = document.getElementById('empName').value;
    let email    = document.getElementById('email').value;
    let age      = document.getElementById('age').value;
    let dept     = document.getElementById('dept').value;
    let grad     = document.getElementById('grad').value;
    let gradYear = document.getElementById('gradYear').value;
    let grade    = document.querySelector('input[name="grade"]:checked');
    let postgrad = document.getElementById('postgrad').checked;
    let workBefore = document.getElementById('priorWork').checked;
    let workyr   = document.querySelector('input[name="workyr"]:checked');

    let emp = {
        name:       name,
        email:      email,
        age:        age,
        dept:       dept,
        gradCourse: grad,
        gradYear:   gradYear,
        gradPerf:   grade ? grade.value : '',
        postgrad:   postgrad,
        workBefore: workBefore,
        workEx:     workyr ? workyr.value : 'None'
    };
    employees.push(emp);
    showEmployees();
}

function showDepartments(){
    if(departments.length===0){
        return '<h5>No department has been defined</h5>';
    }
    const arr = departments.map(dep => {
        return '<div class="border p-2">'+dep+'</div>';
    });
    let str = '<h3 class="text-center mb-3">List of Departments</h3>';
    str += arr.join('');
    return str;
}

function showDeptForm(){
    let str = '';
    str += makeTextField('dept', 'Department Name', 'Enter Department Name');
    str += '<button class="btn btn-primary" onclick="submitDept()">Submit</button>';
    return str;
}

function submitDept(){
    let dept = document.getElementById('dept').value;
    departments.push(dept);
    showDepartmentPage();
}

function makeTextField(id,label,placeholder=''){
    let str = '<div class="form-group">';
    str += '<label>'+label+'</label>';
    str += '<input type="text" class="form-control" id="'+id+'" placeholder="'+placeholder+'">';
    str += '</div>';
    return str;
}

function makeNavbar(active=1){
    let active1 = active===1 ? 'active' : '';
    let active2 = active===2 ? 'active' : '';
    let active3 = active===3 ? 'active' : '';
    let active4 = active===4 ? 'active' : '';
    let str = '<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">';
    str += '<a class="navbar-brand" href="#">Employee System</a>';
    str += '<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">';
    str += '<span class="navbar-toggler-icon"></span>';
    str += '</button>';
    str += '<div class="collapse navbar-collapse show" id="navbarNav">';
    str += '<ul class="navbar-nav">';
    str += '<li class="nav-item '+active1+'">';
    str += '<a class="nav-link" href="#" onclick="showEmployees()">Show Employees</a>';
    str += '</li>';
    str += '<li class="nav-item '+active2+'">';
    str += '<a class="nav-link" href="#" onclick="addEmployeePage()">Add an Employee</a>';
    str += '</li>';
    str += '<li class="nav-item '+active3+'">';
    str += '<a class="nav-link" href="#" onclick="showDepartmentPage()">Departments</a>';
    str += '</li>';
    str += '<li class="nav-item '+active4+'">';
    str += '<a class="nav-link" href="#" onclick="addDeptPage()">Add a Dept</a>';
    str += '</li>';
    str += '</ul>';
    str += '</div>';
    str += '</nav>';
    return str;
}

</script>

</body>
</html>
